services:
  bot:
    image: ${IMAGE_TAG:-orakel-bot:local}
    build:
      context: ../..
      dockerfile: packages/bot/Dockerfile
      args:
        - BUILD_UID=${UID:-1000}
        - BUILD_GID=${GID:-1000}
    env_file: ../../.env
    environment:
      - PAPER_MODE=${PAPER_MODE:-true}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:9998}
    ports:
      - "9999:9999"
    volumes:
      - ../../config.json:/app/config.json:ro
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - orakel-network

networks:
  orakel-network:
    driver: bridge
