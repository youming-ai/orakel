services:
  bot:
    image: ${IMAGE_TAG:-orakel-bot:local}
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
      args:
        - BUILD_UID=${UID:-1000}
        - BUILD_GID=${GID:-1000}
    env_file: .env
    ports:
      - "9999:9999"
    volumes:
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
