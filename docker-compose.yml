services:
  bot:
    image: ${IMAGE_TAG:-orakel-bot:local}
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
      args:
        - BUILD_UID=${UID:-1000}
        - BUILD_GID=${GID:-1000}
    env_file: .env
    environment:
      - PAPER_MODE=${PAPER_MODE:-true}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:9998}
    ports:
      - "9999:9999"
    volumes:
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - orakel-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orakel
      POSTGRES_PASSWORD: orakel
      POSTGRES_DB: orakel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orakel-network

volumes:
  postgres_data:

networks:
  orakel-network:
    driver: bridge
